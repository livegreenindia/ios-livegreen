name: Build Android App Bundle

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (e.g., 2, 3, 4...)'
        required: true
        default: '2'
      build_name:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: premium

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Decode keystore
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks

      - name: Create key.properties
        working-directory: frontend/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        working-directory: frontend
        env:
          RAZORPAY_PAYMENT_LINK: ${{ secrets.RAZORPAY_PAYMENT_LINK }}
        run: |
          flutter build appbundle \
            --release \
            --build-name=${{ github.event.inputs.build_name }} \
            --build-number=${{ github.event.inputs.build_number }} \
            --dart-define=RAZORPAY_PAYMENT_LINK=${RAZORPAY_PAYMENT_LINK}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: frontend/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.event.inputs.build_name != ''
        with:
          tag_name: v${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          name: Release ${{ github.event.inputs.build_name }} (${{ github.event.inputs.build_number }})
          draft: false
          prerelease: false
          files: frontend/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
