workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      groups:
        - appstore_credentials   # APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID,
                                 # APP_STORE_CONNECT_PRIVATE_KEY, CERTIFICATE_PRIVATE_KEY, APP_STORE_APPLE_ID
      vars:
        BUNDLE_ID: com.livegreen.ios
        APP_STORE_APPLE_ID: 6775098622

    scripts:
      - name: Fetch signing files
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Set up keychain and provisioning profiles
        script: |
          set -e
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Install Flutter dependencies
        script: |
          set -e
          cd frontend
          flutter pub get

      - name: Install CocoaPods
        script: |
          set -e
          cd frontend/ios
          pod install

      - name: Build iOS IPA
        script: |
          set -e
          cd frontend
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 16) + 1))
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - apps@livegreenindia.com
        notify:
          success: true
          failure: true
