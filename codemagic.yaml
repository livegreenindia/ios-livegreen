workflows:
  ios-release:
    name: iOS Release 001
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          flutter pub get
      - name: Build iOS IPA
        script: |
          cd frontend
          flutter build ipa --release
    artifacts:
      - frontend/build/ios/ipa/*.ipa
